<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="어울림 석고몰드 프로젝트 상세">
  <meta name="theme-color" content="#f4f3ef">
  <title>프로젝트 | 어울림</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css?v=9">
  <link rel="stylesheet" href="css/responsive/common.css?v=9">
  <link rel="stylesheet" href="css/project.css?v=11">
  <link rel="stylesheet" href="css/responsive/project.css?v=11">
  <script src="js/layout.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body class="inner-page project-detail-page">
  <a class="skip-link" href="#main">본문 바로가기</a>
  <div class="page-progress" aria-hidden="true"><i></i></div>

  <div data-site-header data-nav="work" data-header-variant="inner"></div>

  <main id="main" class="project-detail" data-project-detail>
    <section class="detail-gallery reveal" data-project-gallery aria-label="프로젝트 이미지"></section>

    <header class="detail-heading reveal">
      <p class="eyebrow"><span data-project-number>01</span> · 주요 작업</p>
      <h1 data-project-title>괄사 오브젝트</h1>
      <div class="detail-facts">
        <p><small>연도</small><span data-project-year>2026</span></p>
        <p><small>유형</small><span data-project-type>2분할 몰드</span></p>
        <p><small>작업 범위</small><span data-project-service>3D 모델링 · 몰드 제작 · 테스트</span></p>
      </div>
    </header>

    <section class="detail-story reveal">
      <p class="eyebrow">작업 노트</p>
      <h2 class="sr-only" data-project-kicker>손에 닿는 곡선을 정확하게 구현합니다.</h2>
      <p data-project-description>유기적인 곡면과 안정적인 분할선을 함께 고려해 설계한 2분할 석고몰드입니다. 실제 슬립캐스팅 테스트를 통해 주입과 탈형 과정의 사용성을 검증했습니다.</p>
    </section>

    <nav class="detail-nav reveal" aria-label="프로젝트 이동">
      <a class="detail-nav-link detail-nav-link--back" href="index.html" data-back-link>
        <b aria-hidden="true">←</b>
        <span>목록보기</span>
      </a>
      <a class="detail-nav-link" data-next-project href="project.html?id=02">
        <span>다음 프로젝트</span>
        <b aria-hidden="true">→</b>
      </a>
    </nav>
  </main>

  <div data-site-footer></div>

  <div class="project-lightbox" data-project-lightbox hidden aria-hidden="true">
    <button type="button" class="project-lightbox__backdrop" data-lightbox-close aria-label="닫기"></button>
    <div class="project-lightbox__dialog" role="dialog" aria-modal="true" aria-label="이미지 확대 보기">
      <div class="project-lightbox__toolbar">
        <button type="button" class="project-lightbox__close" data-lightbox-close aria-label="닫기">
          <span aria-hidden="true">×</span>
        </button>
      </div>
      <button type="button" class="project-lightbox__nav project-lightbox__nav--prev" data-lightbox-prev aria-label="이전 이미지" hidden>
        <span aria-hidden="true">←</span>
      </button>
      <figure class="project-lightbox__figure" data-lightbox-figure>
        <img class="project-lightbox__image" data-lightbox-image src="" alt="">
      </figure>
      <button type="button" class="project-lightbox__nav project-lightbox__nav--next" data-lightbox-next aria-label="다음 이미지" hidden>
        <span aria-hidden="true">→</span>
      </button>
      <p class="project-lightbox__counter" data-lightbox-counter aria-live="polite" hidden></p>
    </div>
  </div>
</body>
</html>
